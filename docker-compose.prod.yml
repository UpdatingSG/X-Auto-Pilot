# Production stack — VPS or any Docker host with a .env file.
# Usage:
#   cp .env.production.example .env.production
#   # fill in secrets + domains
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xautopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-xautopilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xautopilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api.prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-xautopilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xautopilot}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL}
      X_API_MODE: ${X_API_MODE:-live}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      X_REDIRECT_URI: ${X_REDIRECT_URI:?set X_REDIRECT_URI}
      LLM_MODE: ${LLM_MODE:-live}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_DAILY_BUDGET_USD: ${LLM_DAILY_BUDGET_USD:-5.0}
      WORKER_ENABLED: "true"
      WORKER_MANUAL_TICK_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      PORT: "3000"
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
