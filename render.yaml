# Render Blueprint — deploy API + Web + Postgres from GitHub
# Docs: https://render.com/docs/blueprint-spec
#
# Setup:
# 1. Push repo to GitHub
# 2. Render Dashboard → New → Blueprint → connect repo
# 3. Set sync: false env vars marked below (secrets + X OAuth)
# 4. After deploy, update X Developer Portal callback to your FRONTEND_URL/settings/x/callback

databases:
  - name: xautopilot-db
    plan: free
    databaseName: xautopilot
    user: xautopilot

services:
  - type: web
    name: xautopilot-api
    runtime: docker
    plan: starter
    dockerfilePath: ./infra/docker/Dockerfile.api.prod
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xautopilot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: X_API_MODE
        value: live
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: LLM_MODE
        value: live
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_DAILY_BUDGET_USD
        value: "5.0"
      - key: WORKER_ENABLED
        value: "true"
      - key: WORKER_MANUAL_TICK_ENABLED
        value: "false"

  - type: web
    name: xautopilot-web
    runtime: docker
    plan: starter
    dockerfilePath: ./infra/docker/Dockerfile.web.prod
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    buildFilter:
      paths:
        - apps/web/**
        - infra/docker/Dockerfile.web.prod
